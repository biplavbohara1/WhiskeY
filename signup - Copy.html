<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Looma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #60a5fa; border-radius: 10px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Transition for the Floating Labels */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #3b82f6;
        }

        .input-group label {
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        /* Background for the left side */
        .image-side {
            background: url("fello.jpg") no-repeat center center/cover;
            position: relative;
        }

        /* Removed the blue gradient and replaced it with a neutral dark fade for image clarity */
        .image-overlay {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.7));
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-10">

    <main class="flex flex-col md:flex-row w-full max-w-5xl bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[700px]">
        
        <div class="hidden md:flex md:w-1/2 image-side relative p-12 flex-col justify-between text-white">
            <div class="image-overlay absolute inset-0"></div>
            
            <div class="relative z-10">
                <h1 class="text-4xl font-bold tracking-tight">Looma</h1>
                <p class="mt-2 text-gray-200">Your thoughts, organized.</p>
            </div>

            <div class="relative z-10">
                <blockquote class="text-xl font-medium italic">
                    "The palest ink is better than the best memory."
                </blockquote>
                <div class="flex gap-2 mt-6">
                    <span class="w-8 h-1 bg-white rounded-full"></span>
                    <span class="w-2 h-1 bg-white/50 rounded-full"></span>
                    <span class="w-2 h-1 bg-white/50 rounded-full"></span>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center relative">
            
            <div class="mb-10">
                <p class="text-blue-500 font-semibold text-sm mb-1">Start for free</p>
                <h2 class="text-4xl font-bold text-gray-800">Create account</h2>
            </div>

            <form id="signupForm" class="space-y-6">
                <div class="input-group relative border-b-2 border-gray-200 focus-within:border-blue-500 transition-colors">
                    <input type="text" required placeholder=" " 
                           class="block w-full py-3 bg-transparent focus:outline-none text-gray-700">
                    <label class="absolute left-0 top-3 text-gray-400 origin-[0]">Full Name</label>
                </div>

                <div class="input-group relative border-b-2 border-gray-200 focus-within:border-blue-500 transition-colors">
                    <input type="email" id="signupEmail" required placeholder=" " 
                           class="block w-full py-3 bg-transparent focus:outline-none text-gray-700">
                    <label class="absolute left-0 top-3 text-gray-400 origin-[0]">Email Address</label>
                </div>

                <div class="input-group relative border-b-2 border-gray-200 focus-within:border-blue-500 transition-colors flex items-center">
                    <input type="password" id="signupPassword" required placeholder=" " 
                           class="block w-full py-3 bg-transparent focus:outline-none text-gray-700 pr-10">
                    <label class="absolute left-0 top-3 text-gray-400 origin-[0]">Password</label>
                    <button type="button" id="toggleSignupPassword" class="absolute right-0 text-gray-400 hover:text-gray-600 focus:outline-none z-10">
                        <i class="fa-solid fa-eye" id="signupEyeIcon"></i>
                    </button>
                </div>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="terms" required class="w-4 h-4 text-blue-600 rounded">
                    <label for="terms" class="text-sm text-gray-500">I agree to the Terms & Conditions</label>
                </div>

                <button type="submit" 
                        class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg">
                    Create a new account
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or continue with</span></div>
            </div>

            <button id="googleSignup" 
                    class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-700 py-3 rounded-xl hover:bg-gray-50 transition-all font-medium">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="w-5" alt="Google">
                Sign up with Google
            </button>

            <p class="text-center mt-10 text-sm text-gray-500">
                Already have an account? 
                <a href="try.html" class="text-blue-600 font-bold hover:underline">Login</a>
            </p>
        </div>
    </main>

    <script type="module">
        // Password Toggle Logic
        const togglePassword = document.querySelector('#toggleSignupPassword');
        const passwordInput = document.querySelector('#signupPassword');
        const eyeIcon = document.querySelector('#signupEyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1kgpQqK10rXYvmJ541OM8MkTRsvrjHeI",
            authDomain: "notenest-7c6a4.firebaseapp.com",
            projectId: "notenest-7c6a4",
            storageBucket: "notenest-7c6a4.firebasestorage.app",
            messagingSenderId: "298237437825",
            appId: "1:298237437825:web:7093edfd299f3465daaa80",
            measurementId: "G-J0PESB2M9Q"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'page.html';
            } catch (error) {
                alert("Signup Error: " + error.message);
            }
        });

        document.getElementById('googleSignup').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'page.html';
            } catch (error) {
                alert("Google Signup Error: " + error.message);
            }
        });
    </script>
</body>
</html>
