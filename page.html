<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Looma - SHARE NOTEs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 56px;
      background: #ffffff;
      border-bottom: 1px solid #e5e4dd;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      height: 34px;
      background: transparent;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      color: #555;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .logout-btn:hover { background: #fdf0f0; border-color: #f5c8c8; color: #b03030; }

    
    .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
    .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap input { width: 100%; padding: 0 12px 0 38px; height: 40px; border: 1px solid #d0cfc8; border-radius: 10px; background: #ffffff; color: #1a1a1a; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .search-wrap input:focus { border-color: #888; }
    .search-wrap input::placeholder { color: #aaa; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #aaa; pointer-events: none; }

    .drop-zone { border: 1.5px dashed #c5c4bc; border-radius: 12px; padding: 1.75rem 1.5rem; margin-bottom: 2rem; background: #efefec; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; transition: border-color 0.15s, background 0.15s; }
    .drop-zone.drag-over { border-color: #555; background: #e8e8e4; }
    .drop-left { display: flex; align-items: center; gap: 14px; }
    .drop-left svg { flex-shrink: 0; color: #999; }
    .drop-text p { font-size: 14px; color: #555; margin-bottom: 3px; }
    .drop-text span { font-size: 13px; color: #999; }
    .upload-btn { display: flex; align-items: center; gap: 8px; padding: 0 20px; height: 40px; background: #ffffff; border: 1px solid #d0cfc8; border-radius: 10px; color: #1a1a1a; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .upload-btn:hover { background: #f0f0ed; border-color: #999; }
    #fileInput { display: none; }

    .stats-row { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card { background: #efefec; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 120px; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 14px; font-weight: 500; color: #888; }
    .sort-select { font-size: 12px; border: 1px solid #d0cfc8; border-radius: 8px; padding: 4px 8px; background: #ffffff; color: #888; outline: none; cursor: pointer; }

    .pdf-list { display: flex; flex-direction: column; gap: 8px; }
    .pdf-item { display: flex; align-items: center; gap: 14px; background: #ffffff; border: 1px solid #e5e4dd; border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s, background 0.15s; animation: fadeIn 0.2s ease; }
    .pdf-item:hover { border-color: #c5c4bc; background: #fafaf8; }
    .pdf-icon { width: 38px; height: 44px; border-radius: 6px; background: #ddeaf8; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
    .pdf-icon-lines { display: flex; flex-direction: column; gap: 2px; padding: 0 5px; }
    .pdf-icon-line { height: 2px; border-radius: 1px; background: #a8c8ee; }
    .pdf-icon-label { font-size: 9px; font-weight: 600; color: #1a5a9a; letter-spacing: 0.5px; margin-top: 2px; }
    .pdf-meta { flex: 1; min-width: 0; }
    .pdf-name { font-size: 14px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pdf-info { font-size: 12px; color: #aaa; margin-top: 3px; }
    .pdf-badge { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: #ddeaf8; color: #1a5a9a; white-space: nowrap; flex-shrink: 0; }
    .pdf-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 30px; height: 30px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: #bbb; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s, border-color 0.12s, color 0.12s; }
    .icon-btn:hover { background: #f0f0ed; border-color: #e0dfd8; color: #333; }
    .icon-btn.del:hover { background: #fdf0f0; border-color: #f5c8c8; color: #b03030; }

    .empty-state { text-align: center; padding: 3rem 1.5rem; }
    .empty-state p { font-size: 15px; color: #888; margin-bottom: 6px; }
    .empty-state span { font-size: 13px; color: #bbb; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #fff;
      border: 1px solid #d0cfc8;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      color: #333;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: transform 0.25s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

   
    .upload-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>


<nav class="navbar">
  <div class="navbar-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    L
  </div>
  <button class="logout-btn" onclick="handleLogout()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Logout
  </button>
</nav>


<div class="page">
  <div class="topbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4.5"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search PDFs…" oninput="filterList()">
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-left">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <div class="drop-text">
        <p>Drag and drop PDF files here</p>
        <span>Supports multiple files at once</span>
      </div>
    </div>
    <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 11V3M4 6l4-3 4 3"/>
        <path d="M2 13h12"/>
      </svg>
      Add PDF
    </button>
  </div>
  <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFiles(this.files)">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total files</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total size</div>
      <div class="stat-value" id="statSize">0 KB</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Added today</div>
      <div class="stat-value" id="statToday">0</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title" id="listLabel">All files</span>
    <select class="sort-select" onchange="sortList(this.value)">
      <option value="date">Newest first</option>
      <option value="name">Name A–Z</option>
      <option value="size">Largest first</option>
    </select>
  </div>

  <div class="pdf-list" id="pdfList">
    <div class="empty-state">
      <p>No PDFs yet</p>
      <span>Upload files to get started</span>
    </div>
  </div>
</div>


<div id="uploadModal" class="upload-modal">
  <div style="background:white; padding:30px; border-radius:12px; width:90%; max-width:400px;">
    <h3 style="margin-bottom:20px;">Enter Note Details</h3>
    <input id="modalSubject" placeholder="Class:" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ccc; border-radius:8px;"><br>
    <input id="modalTopic" placeholder="Subject:" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:8px;"><br>
    <button onclick="saveWithDetails()" style="background:#1a1a1a; color:white; border:none; padding:12px 20px; border-radius:8px; margin-right:8px;">Upload</button>
    <button onclick="cancelModal()" style="background:#f0f0f0; border:none; padding:12px 20px; border-radius:8px;">Cancel</button>
  </div>
</div>


<div class="toast" id="toast"></div>

<script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  
  const supabaseUrl = 'https://vlfvznqtwrjvrioysgxc.supabase.co';
  const supabaseAnonKey = 'sb_publishable_rSzfUQNqV0CvKPSS7QZfiw_oRzrRqmH';

  const supabase = createClient(supabaseUrl, supabaseAnonKey);

  const firebaseConfig = {
    apiKey: "AIzaSyB1kgpQqK10rXYvmJ541OM8MkTRsvrjHeI",
    authDomain: "notenest-7c6a4.firebaseapp.com",
    projectId: "notenest-7c6a4",
    storageBucket: "notenest-7c6a4.firebasestorage.app",
    messagingSenderId: "298237437825",
    appId: "1:298237437825:web:7093edfd299f3465daaa80"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let files = [];
  let currentFile = null;

 
  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = 'try.html';
  });

  window.handleLogout = async () => {
    if (confirm('Are you sure you want to logout?')) {
      await signOut(auth);
      localStorage.removeItem('isLoggedIn');
      window.location.href = 'try.html';
    }
  };

  // ====================== LOAD NOTES ======================
  function loadNotes() {
    const q = query(collection(db, "notes"), orderBy("uploadedAt", "desc"));
    onSnapshot(q, (snapshot) => {
      files = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateStats();
      renderList(document.getElementById('searchInput').value);
    });
  }
  loadNotes();

  // ====================== UPLOAD ======================
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') fileInput.click();
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      currentFile = e.target.files[0];
      document.getElementById('uploadModal').style.display = 'flex';
      document.getElementById('modalSubject').value = '';
      document.getElementById('modalTopic').value = '';
    }
  });

  // Drag & Drop
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      currentFile = e.dataTransfer.files[0];
      document.getElementById('uploadModal').style.display = 'flex';
    }
  });

  window.cancelModal = () => {
    document.getElementById('uploadModal').style.display = 'none';
    currentFile = null;
  };

  window.saveWithDetails = async () => {
    const subject = document.getElementById('modalSubject').value.trim();
    const topic = document.getElementById('modalTopic').value.trim();

    if (!subject || !topic || !currentFile) {
      alert("Please fill Subject and Topic");
      return;
    }

    document.getElementById('uploadModal').style.display = 'none';

    try {
      const filePath = `${Date.now()}_${currentFile.name}`;   // Simplified path

      const { error: uploadError } = await supabase.storage
        .from('notes')
        .upload(filePath, currentFile, { cacheControl: '3600', upsert: false });

      if (uploadError) throw uploadError;

      const { data: urlData } = supabase.storage.from('notes').getPublicUrl(filePath);
      const publicUrl = urlData.publicUrl;

      await addDoc(collection(db, "notes"), {
        name: currentFile.name,
        url: publicUrl,
        subject: subject,
        topic: topic,
        size: currentFile.size,
        filePath: filePath,           // Important: Save filePath for deletion
        uploadedAt: serverTimestamp()
      });

      showToast("PDF uploaded successfully! 🎉");
      currentFile = null;

    } catch (error) {
      console.error(error);
      alert("Upload failed: " + error.message);
    }
  };

  // ====================== DELETE FUNCTION ======================
  window.deleteFile = async (docId, filePath) => {
    if (!confirm("Are you sure you want to delete this PDF?")) return;

    try {
      // 1. Delete from Supabase Storage
      const { error: storageError } = await supabase.storage
        .from('notes')
        .remove([filePath]);

      if (storageError) console.warn("Storage delete warning:", storageError);

      // 2. Delete from Firestore
      await deleteDoc(doc(db, "notes", docId));

      showToast("PDF deleted successfully");
    } catch (error) {
      console.error(error);
      alert("Delete failed: " + error.message);
    }
  };

  // ====================== UI FUNCTIONS ======================
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return Math.round(b / 1024) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = files.length;
    const totalBytes = files.reduce((a, f) => a + (f.size || 0), 0);
    document.getElementById('statSize').textContent = formatSize(totalBytes);
  }

  function renderList(query = '') {
    const q = query.toLowerCase().trim();
    let filtered = files.filter(f => 
      f.name.toLowerCase().includes(q) || 
      (f.subject && f.subject.toLowerCase().includes(q)) ||
      (f.topic && f.topic.toLowerCase().includes(q))
    );

    const list = document.getElementById('pdfList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No PDFs found</p><span>Upload files to get started</span></div>`;
      return;
    }

    list.innerHTML = filtered.map(f => `
      <div class="pdf-item">
        <div class="pdf-icon">📄</div>
        <div class="pdf-meta">
          <div class="pdf-name">${f.name}</div>
          <div class="pdf-info">${f.subject || ''} • ${f.topic || ''}</div>
        </div>
        <div class="pdf-actions">
          <a href="${f.url}" target="_blank" class="icon-btn">👁</a>
          <button onclick="deleteFile('${f.id}', '${f.filePath}')" class="icon-btn del" title="Delete">
            🗑
          </button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('searchInput').addEventListener('input', (e) => renderList(e.target.value));
  window.sortList = (mode) => renderList(document.getElementById('searchInput').value);

  renderList();
</script>
</body>
</html>
